<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CUTE Dashboard</title>
    <style>
      body { margin:0; font-family: Arial, sans-serif; background:#0d0b1f; color:#fff; }
      .app { max-width:900px; margin:0 auto; display:flex; min-height:100vh; }
      .sidebar {
        width:64px; border-right:1px solid rgba(255,255,255,.07);
        background:#17132c; display:flex; flex-direction:column; align-items:center; padding:14px 8px;
        gap:10px;
      }
      .menu-btn {
        width:74px; height:62px; border-radius:14px; border:none;
        background:transparent; color:rgba(255,255,255,.72); display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:6px; font-size:23px;
        outline:none;
        box-shadow:none;
        -webkit-tap-highlight-color: transparent;
      }
      .menu-btn:focus,
      .menu-btn:focus-visible,
      .menu-btn:active {
        outline: none;
        box-shadow: none;
      }
      .menu-btn .icon {
        width:24px; height:24px; display:grid; place-items:center;
        font-size:20px; font-weight:700; line-height:1;
      }
      .menu-btn .label { font-size:13px; color:rgba(255,255,255,.7); font-weight:700; }
      .menu-btn.on { background:rgba(255,255,255,.09); color:#fff; }
      .menu-btn.on .label { color:#fff; }
      .main { flex:1; padding:18px; }
      .topbar {
        display:flex;
        align-items:center;
        justify-content:space-between;
        background:#17132c;
        border-bottom:1px solid rgba(255,255,255,.07);
        padding:10px 16px;
        margin:-18px -18px 12px;
        min-height:52px;
      }
      .lang-wrap {
        position:relative;
        display:flex;
        align-items:center;
        gap:6px;
      }
      .lang-btn {
        border:none;
        border-radius:8px;
        padding:7px 10px;
        font-size:12px;
        font-weight:700;
        background:rgba(255,255,255,.12);
        color:#fff;
      }
      .lang-icon {
        width:14px;
        height:14px;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        color:rgba(255,255,255,.38);
      }
      .lang-icon svg {
        width:14px;
        height:14px;
        stroke:currentColor;
      }
      .lang-menu {
        position:absolute;
        right:0;
        top:38px;
        background:#1f1a34;
        border:1px solid rgba(255,255,255,.12);
        border-radius:10px;
        padding:6px;
        display:none;
        min-width:110px;
        z-index:60;
      }
      .lang-menu.on { display:block; }
      .lang-option {
        width:100%;
        text-align:left;
        background:transparent;
        color:rgba(255,255,255,.82);
        border:none;
        border-radius:8px;
        padding:7px 8px;
        font-size:12px;
        font-weight:700;
      }
      .lang-option:hover { background:rgba(255,255,255,.08); color:#fff; }
      .row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
      .card { background:#1e1a35; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:12px; }
      .state-connected { border-color: rgba(0,212,154,.65) !important; }
      .state-disconnected { border-color: rgba(255,69,48,.75) !important; }
      .state-paused { border-color: rgba(245,196,0,.75) !important; }
      .state-init { border-color: rgba(120,140,255,.65) !important; }
      .state-stopped { border-color: rgba(190,190,190,.55) !important; }
      .muted { color:rgba(255,255,255,.65); font-size:12px; }
      .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; }
      .ok { background:rgba(0,212,154,.2); color:#00d49a; }
      .bad { background:rgba(255,69,48,.2); color:#ff4530; }
      .warn { background:rgba(245,196,0,.18); color:#f5c400; }
      ul { list-style:none; padding:0; margin:0; }
      li { padding:8px 0; border-bottom:1px solid rgba(255,255,255,.1); }
      button { border:none; border-radius:10px; padding:9px 12px; font-weight:700; cursor:pointer; }
      .controls { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
      .control-btn { background:#2a2550; color:white; border:1px solid rgba(255,255,255,.15); }
      .view { display:none; }
      .view.on { display:block; }
      .debug-box { margin-top:10px; padding:10px; border-radius:10px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); font-size:12px; white-space:pre-wrap; word-break:break-word; display:none; }
      .debug-box.on { display:block; }
      .sensor-card-pressable { cursor:pointer; }
      .sensor-card-pressable:active { transform: scale(0.995); }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.45);
        display:none;
        align-items:flex-end;
        justify-content:center;
        z-index: 80;
      }
      .modal-backdrop.on { display:flex; }
      .modal {
        width:min(520px, 100%);
        background:#1b1730;
        border-top-left-radius:16px;
        border-top-right-radius:16px;
        border:1px solid rgba(255,255,255,.12);
        padding:14px;
      }
      .modal-title { font-size:14px; font-weight:800; margin-bottom:10px; }
      .modal-actions { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
      .modal-btn {
        background:#2a2550;
        color:white;
        border:1px solid rgba(255,255,255,.16);
        border-radius:10px;
        padding:10px 12px;
        font-weight:800;
      }
      .modal-close {
        margin-top:10px;
        width:100%;
        background:rgba(255,255,255,.08);
        color:#fff;
      }
      @media (max-width: 680px) {
        .app { max-width:100%; display:block; }
        .row { grid-template-columns:1fr; }

        .sidebar {
          position: fixed;
          left: 0;
          right: 0;
          bottom: 0;
          width: 100%;
          height: 56px;
          flex-direction: row;
          justify-content: center;
          border-right: none;
          border-top: 1px solid rgba(255,255,255,.06);
          z-index: 50;
          padding: 6px;
          background:#17132c;
        }

        .main {
          padding: 18px;
          padding-bottom: 74px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <button id="menu-dashboard" class="menu-btn on" title="메인 대시보드"><span class="icon">⌂</span><span class="label">홈</span></button>
        <button id="menu-log" class="menu-btn" title="로그"><span class="icon">≡</span><span class="label">로그</span></button>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <div id="title" style="font-size:17px; font-weight:800;">CUTE 대시보드</div>
            <div id="subtitle" class="muted">Monitoring + Control (MVP)</div>
          </div>
          <div class="lang-wrap">
            <span class="lang-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-languages">
                <path d="m5 8 6 6"/>
                <path d="m4 14 6-6 2-3"/>
                <path d="M2 5h12"/>
                <path d="M7 2h1"/>
                <path d="m22 22-5-10-5 10"/>
                <path d="M14 18h6"/>
              </svg>
            </span>
            <button id="lang-current" class="lang-btn"><span>한국어 ▾</span></button>
            <div id="lang-menu" class="lang-menu">
              <button class="lang-option" data-lang="ko">한국어</button>
              <button class="lang-option" data-lang="en">English</button>
            </div>
          </div>
        </div>
        <div style="margin:10px 0 8px">
          <span id="conn" class="badge bad">connecting</span>
        </div>
        <div id="netmsg" class="muted" style="margin-bottom:12px; color:#ffb4b4;"></div>

        <section id="view-dashboard" class="view on">
          <div class="row" id="cards"></div>

          <div class="card" style="margin-top:12px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <strong>제어</strong>
              <span id="ack" class="badge warn">idle</span>
            </div>
            <div class="controls">
              <button class="control-btn" data-action="fan_on">팬 ON</button>
              <button class="control-btn" data-action="fan_off">팬 OFF</button>
              <button class="control-btn" data-action="refresh">센서 갱신</button>
            </div>
          </div>
        </section>

        <section id="view-log" class="view">
          <div class="card" style="margin-top:12px; margin-bottom:10px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <strong>센서 상태</strong>
              <span id="sensor-state-badge" class="badge warn">loading</span>
            </div>
            <div class="muted" style="margin-bottom:8px;">Legend</div>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
              <span class="badge ok">CONNECTED</span>
              <span class="badge bad">DISCONNECTED</span>
              <span class="badge warn">PAUSED</span>
              <span class="badge" style="background:rgba(120,140,255,.18); color:#9ab0ff;">INIT</span>
              <span class="badge" style="background:rgba(190,190,190,.18); color:#cfcfcf;">STOPPED</span>
            </div>
          </div>

          <div class="card" style="margin-top:12px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <strong>로그</strong>
              <button id="refresh">새로고침</button>
            </div>
            <ul id="events"></ul>
            <div id="control-debug-box" class="debug-box"></div>
          </div>
        </section>
      </main>
    </div>
    <div id="sensor-control-modal" class="modal-backdrop">
      <div class="modal">
        <div class="modal-title">센서 제어</div>
        <div class="modal-actions">
          <button class="modal-btn" id="btn-comm-on">통신 ON</button>
          <button class="modal-btn" id="btn-comm-off">통신 OFF</button>
          <button class="modal-btn" id="btn-loop-start">루프 START</button>
          <button class="modal-btn" id="btn-loop-stop">루프 STOP</button>
        </div>
        <button class="modal-btn modal-close" id="btn-modal-close">닫기</button>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
