<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CUTE Dashboard</title>
    <style>
      body { margin:0; font-family: Arial, sans-serif; background:#0d0b1f; color:#fff; }
      .app { max-width:900px; margin:0 auto; display:flex; min-height:100vh; }
      .sidebar {
        width:64px; border-right:1px solid rgba(255,255,255,.07);
        background:#17132c; display:flex; flex-direction:column; align-items:center; padding:14px 8px;
        gap:10px;
      }
      .menu-btn {
        width:74px; height:62px; border-radius:14px; border:none;
        background:transparent; color:rgba(255,255,255,.72); display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:6px; font-size:23px;
        outline:none;
        box-shadow:none;
        -webkit-tap-highlight-color: transparent;
      }
      .menu-btn:focus,
      .menu-btn:focus-visible,
      .menu-btn:active {
        outline: none;
        box-shadow: none;
      }
      .menu-btn .icon {
        width:24px; height:24px; display:grid; place-items:center;
        font-size:20px; font-weight:700; line-height:1;
      }
      .menu-btn .label { font-size:13px; color:rgba(255,255,255,.7); font-weight:700; }
      .menu-btn.on { background:rgba(255,255,255,.09); color:#fff; }
      .menu-btn.on .label { color:#fff; }
      .main { flex:1; padding:18px; }
      .topbar {
        display:flex;
        align-items:center;
        justify-content:space-between;
        background:#17132c;
        border-bottom:1px solid rgba(255,255,255,.07);
        padding:14px 18px;
        margin:-18px -18px 12px;
        min-height:64px;
      }
      .lang-wrap { position:relative; }
      .lang-btn {
        border:none;
        border-radius:8px;
        padding:7px 10px;
        font-size:12px;
        font-weight:700;
        background:rgba(255,255,255,.12);
        color:#fff;
      }
      .lang-menu {
        position:absolute;
        right:0;
        top:38px;
        background:#1f1a34;
        border:1px solid rgba(255,255,255,.12);
        border-radius:10px;
        padding:6px;
        display:none;
        min-width:110px;
        z-index:60;
      }
      .lang-menu.on { display:block; }
      .lang-option {
        width:100%;
        text-align:left;
        background:transparent;
        color:rgba(255,255,255,.82);
        border:none;
        border-radius:8px;
        padding:7px 8px;
        font-size:12px;
        font-weight:700;
      }
      .lang-option:hover { background:rgba(255,255,255,.08); color:#fff; }
      .row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
      .card { background:#1e1a35; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:12px; }
      .muted { color:rgba(255,255,255,.65); font-size:12px; }
      .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; }
      .ok { background:rgba(0,212,154,.2); color:#00d49a; }
      .bad { background:rgba(255,69,48,.2); color:#ff4530; }
      .warn { background:rgba(245,196,0,.18); color:#f5c400; }
      ul { list-style:none; padding:0; margin:0; }
      li { padding:8px 0; border-bottom:1px solid rgba(255,255,255,.1); }
      button { border:none; border-radius:10px; padding:9px 12px; font-weight:700; cursor:pointer; }
      .controls { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
      .control-btn { background:#2a2550; color:white; border:1px solid rgba(255,255,255,.15); }
      .view { display:none; }
      .view.on { display:block; }
      @media (max-width: 680px) {
        .app { max-width:100%; display:block; }
        .row { grid-template-columns:1fr; }

        .sidebar {
          position: fixed;
          left: 0;
          right: 0;
          bottom: 0;
          width: 100%;
          height: 56px;
          flex-direction: row;
          justify-content: center;
          border-right: none;
          border-top: 1px solid rgba(255,255,255,.06);
          z-index: 50;
          padding: 6px;
          background:#17132c;
        }

        .main {
          padding: 18px;
          padding-bottom: 74px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <button id="menu-dashboard" class="menu-btn on" title="메인 대시보드"><span class="icon">⌂</span><span class="label">홈</span></button>
        <button id="menu-log" class="menu-btn" title="로그"><span class="icon">≡</span><span class="label">로그</span></button>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <div id="title" style="font-size:17px; font-weight:800;">CUTE 대시보드</div>
            <div id="subtitle" class="muted">Monitoring + Control (MVP)</div>
          </div>
          <div class="lang-wrap">
            <button id="lang-current" class="lang-btn">한국어 ▾</button>
            <div id="lang-menu" class="lang-menu">
              <button class="lang-option" data-lang="ko">한국어</button>
              <button class="lang-option" data-lang="en">English</button>
            </div>
          </div>
        </div>
        <div style="margin:10px 0 8px">
          <span id="conn" class="badge bad">connecting</span>
        </div>
        <div id="netmsg" class="muted" style="margin-bottom:12px; color:#ffb4b4;"></div>

        <section id="view-dashboard" class="view on">
          <div class="row" id="cards"></div>

          <div class="card" style="margin-top:12px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <strong>제어</strong>
              <span id="ack" class="badge warn">idle</span>
            </div>
            <div class="controls">
              <button class="control-btn" data-action="fan_on">팬 ON</button>
              <button class="control-btn" data-action="fan_off">팬 OFF</button>
              <button class="control-btn" data-action="refresh">센서 갱신</button>
            </div>
          </div>
        </section>

        <section id="view-log" class="view">
          <div class="card" style="margin-top:12px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <strong>로그</strong>
              <button id="refresh">새로고침</button>
            </div>
            <ul id="events"></ul>
          </div>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
